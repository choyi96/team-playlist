<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/review.css">
    <script src="../js/review.js" defer></script>
    <title>리뷰 페이지</title>
</head>
<body>

    <header>
        <img src="/image/logo.png" alt="MoodBeat 로고" id="brandLogo">
        <nav>
            <ul>
                <li><a href="main.html">메인 페이지</a></li>
                <li><a href="genres.html">장르별</a></li>
                <li><a href="#">오늘의 음악</a></li>
                <li><a href="#">가사집</a></li>
                <li><a href="#">아티스트</a></li>
                <li><a href="#">My playlist</a></li>
                <li><a href="#">Our playlist</a></li>
                <li><a href="#">감상 후기</a></li>
                <li><a href="#">회원가입</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="review-form-section">
            <h3>리뷰 남기기</h3>
            <form id="review-form">
                <div>
                    <label for="username">닉네임: </label>
                    <input type="text" id="username" required>
                </div>
                <div>
                    <label for="comment">내용: </label>
                    <textarea id="comment" rows="4" required></textarea>
                </div>
                <button type="submit">등록하기</button>
            </form>
        </section>

        <hr>

        <section id="review-list-section">
            <h3>등록된 리뷰</h3>
            <div id="review-container">
                <p id="no-review">첫 리뷰를 작성해보세요!</p>
            </div>
        </section>
    </main>

    <footer>
        <p class="footer-left">
            ©무드비트 2026. All Rights Reserved. <br>
            contact: moodbeat@mail.com
        </p>
        <div class="footer-right">
            <ul>
                <li>이용약관</li>
                <li>개인정보처리방침</li>
            </ul>
        </div>
    </footer>
</body>
</html>
